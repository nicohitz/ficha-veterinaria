<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Imprimir Historia Clínica</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 20px; color: #333; line-height: 1.5; }
        .no-print-bar { background-color: #f5f5f5; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 25px; border: 1px solid #ddd; }
        .no-print-bar button { padding: 10px 20px; font-size: 16px; background-color: #00796b; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .no-print-bar button:hover { background-color: #004d40; }
        @media print {
            .no-print-bar { display: none; }
            body { padding: 0; }
        }
    </style>
</head>
<body>
    <div class="no-print-bar">
        <p style="margin: 0 0 10px 0; font-weight: bold;">Estás en la vista de impresión. Usa el botón de abajo para imprimir o guardar como PDF.</p>
        <button onclick="window.print()">🖨️ Abrir Diálogo de Impresión / Guardar PDF</button>
        <button onclick="window.close()" style="background-color: #78909c; margin-left: 10px;">← Volver y Modificar (Cerrar Pestaña)</button>
    </div>
    <div id="content">Cargando datos de la ficha...</div>
    <script>
        try {
            let htmlContent = null;
            // Buscar la clave de impresión en localStorage
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.endsWith("print_html")) {
                    let val = localStorage.getItem(key);
                    try { htmlContent = JSON.parse(val); } catch(e) { htmlContent = val; }
                    // Limpiar para no acumular basura
                    localStorage.removeItem(key);
                    break;
                }
            }

            if (htmlContent) {
                document.getElementById("content").innerHTML = htmlContent;
                // Autoabrir la impresión tras un breve retardo
                setTimeout(() => {
                    window.print();
                }, 600);
            } else {
                document.getElementById("content").innerHTML = '<h3 style="color: red; text-align: center;">Error: No se encontraron datos para imprimir.</h3>';
            }
        } catch(err) {
            document.getElementById("content").innerHTML = '<h3 style="color: red; text-align: center;">Error al cargar reporte: ' + err.message + '</h3>';
        }
    </script>
</body>
</html>
